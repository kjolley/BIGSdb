<style>
	body {
		margin: 0;
		font-family: Arial, sans-serif;
	}

	#linvis_chart {
		position: relative;
		/* critical: makes children absolute position relative to this div */
		width: 100%;
		aspect-ratio: 1/1;
		/* set desired area height (or use min-height) */
		margin: 0 auto;
		/* optional centering */
		box-sizing: border-box;
		overflow: hidden;
		/* keep canvas/svg inside container */
		border: 1px dashed #888;
		background: #fff !important;
	}

	.tooltip {
		position: fixed;
		pointer-events: none;
		background: rgba(0, 0, 0, 0.85);
		color: #fff;
		padding: 6px 8px;
		border-radius: 4px;
		font-size: 12px;
		max-width: 36em;
		white-space: pre-wrap;
		display: none;
		z-index: 10000;
	}

	.control {
		position: relative;
		float: left;
		top: 10px;
		background: rgba(255, 255, 255, 0.95);
		border: 1px solid #ccc;
		padding: 6px 8px;
		border-radius: 6px;
		font-size: 13px;
	}

	.file-control {
		margin-bottom: 10px
	}

	text {
		dominant-baseline: middle;
		text-anchor: middle;
	}

	input[type="number"] {
		width: 56px;
	}

	/* hide native number input spinners (desktop) so explicit buttons are used */
	input[type="number"]::-webkit-inner-spin-button,
	input[type="number"]::-webkit-outer-spin-button {
		-webkit-appearance: none;
		margin: 0;
	}

	input[type="number"] {
		-moz-appearance: textfield;
	}

	div#waiting {
		display: none;
	}

	div#waiting p {
		font-size: 1.5em;
		color: crimson;
	}
</style>
<div style="position:relative">
	<div class="control">
		<div id="linvis-file-wrapper" class="file-control">
			<input id="linvis-file" type="file" accept=".json">
			<button onclick="location.reload()">Load File</button>
		</div>
		<p>
			<button id="linvis-recenter-btn" type="button"><span class="fas fa-anchor"></span> Anchor top-left</button>
			<button id="linvis-fit-width-btn" type="button" style="margin-left:6px;"><span
					class="fas fa-arrows-h"></span> Fit width</button>
			<button id="linvis-export-svg-btn" type="button" style="margin-left:6px;"><span
					class="fas fa-download"></span> Export SVG</button>
		</p>
		<div id="label-controls" style="display:flex;flex-wrap:wrap;align-items:center;column-gap:18px;row-gap:4px;margin-top:4px;margin-bottom:8px">

			<div>
				<p style="margin:0;">
					Label depth:
					<button id="depth-decr" type="button" aria-label="Decrease depth" style="margin-left:8px;"><span
							class="fas fa-minus"></span></button>
					<input id="depth" type="number" min="0" value="1" style="width:56px; text-align:center; margin:0" />
					<button id="depth-incr" type="button" aria-label="Increase depth"><span
							class="fas fa-plus"></span></button>
				</p>
			</div>
			
			<div>
				<p style="margin:0;">
					Label size:
					<button id="label-size-decr" type="button" aria-label="Smaller" style="margin-left:8px;"><span
							class="fas fa-minus"></span></button>
					<button id="label-size-incr" type="button" aria-label="Larger"><span
							class="fas fa-plus"></span></button>
				</p>
			</div>

			<div style="min-width:240px;max-width:100%;">

				<details id="selected-labels-details" style="position:relative;display:inline-block;">
					<summary style="cursor:pointer;white-space:nowrap;">
						Show specific labels
					</summary>

					<div style="position:absolute;top:100%;left:0;z-index:1000;	background:rgba(255,255,255,0.98);
						border:1px solid #ccc;border-radius:6px;padding:8px;margin-top:4px;
						box-shadow:0 2px 6px rgba(0,0,0,0.15);width:260px;box-sizing:border-box;">
						<div style="text-align:right;margin-bottom:4px;">
							<button id="selected-labels-popout"
								type="button"
								style="font-size:11px;padding:2px 6px;">
								Pop out
							</button>
						</div>
						<div style="font-size:11px;color:#666;margin-bottom:4px;line-height:1.35;">
							Enter one exact LIN prefix per line.<br>
							When populated, label depth is ignored.
						</div>

						<textarea id="selected-labels" rows="5" style="width:100%;
						box-sizing:border-box;resize:vertical;max-width:100%;min-width:100%;font-family:monospace;" 
						placeholder="Example:
34_0_0_0_0
6_0_1_19"></textarea>
					</div>
				</details>
			</div>
		</div>
		<div id="waiting">
			<p>Rendering. Please wait...</p>
		</div>
	</div>

	<div id="linvis_chart" tabindex="0"></div>
	<div id="tooltip" class="tooltip"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="/javascript/Plugins/LINvis.min.js"></script>
