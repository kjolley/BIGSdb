<style>
	body {
		margin: 0;
		font-family: Arial, sans-serif;
	}

	#linvis_chart {
		position: relative;
		/* critical: makes children absolute position relative to this div */
		width: 100%;
		aspect-ratio: 1/1;
		/* set desired area height (or use min-height) */
		margin: 0 auto;
		/* optional centering */
		box-sizing: border-box;
		overflow: hidden;
		/* keep canvas/svg inside container */
		border: 1px dashed #888;
		background: #fff !important;
	}

	.tooltip {
		position: fixed;
		pointer-events: none;
		background: rgba(0, 0, 0, 0.85);
		color: #fff;
		padding: 6px 8px;
		border-radius: 4px;
		font-size: 12px;
		max-width: 36em;
		white-space: pre-wrap;
		display: none;
		z-index: 10000;
	}

	.control {
		position: relative;
		float: left;
		top: 10px;
		background: rgba(255, 255, 255, 0.95);
		border: 1px solid #ccc;
		padding: 6px 8px;
		border-radius: 6px;
		font-size: 13px;
	}
	
	.file-control {
		margin-bottom: 10px
	}

	text {
		dominant-baseline: middle;
		text-anchor: middle;
	}

	input[type="number"] {
		width: 56px;
	}
</style>
<div style="position:relative">
	<div class="control">
		<div id="linvis-file-wrapper" class="file-control">
			<input id="linvis-file" type="file" accept=".json">
			<button onclick="location.reload()">Load File</button>
		</div>
		<p>
			<button id="linvis-recenter-btn" type="button"><span class="fas fa-anchor"></span> Anchor top-left</button>
			<button id="linvis-fit-width-btn" type="button" style="margin-left:6px;"><span class="fas fa-arrows-h"></span> Fit width</button>
		</p>
		<p></p>Label depth: <input id="depth" type="number" min="0" value="1" /></p>
	</div>

	<div id="linvis_chart" tabindex="0"></div>
	<div id="tooltip" class="tooltip"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="/javascript/Plugins/LINvis.min.js"></script>
