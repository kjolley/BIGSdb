<style>
  body { margin: 0; font-family: Arial, sans-serif; }
  
  #chart { 
	width: 100%; 
	height: 100vh; 
	display: flex; 
	align-items: center; 
	justify-content: center; 
	touch-action: none; }
  .tooltip {
    position: fixed; pointer-events: none;
    background: rgba(0,0,0,0.85); color: #fff;
    padding: 6px 8px; border-radius: 4px; font-size: 12px;
    max-width: 36em; white-space: pre-wrap; display:none; z-index:10000;
  }
  .control {
    position: relative; float:left; top: 10px;
    background: rgba(255,255,255,0.95); border: 1px solid #ccc; padding: 6px 8px;
    border-radius: 6px; font-size: 13px;
  }
  text { dominant-baseline: middle; text-anchor: middle; }
  input[type="number"] { width: 56px; }
</style>

  <div class="control">

    <input id="linvis-file" type="file" accept=".json">
<button onclick="location.reload()">Load File</button></p>

  <input id="depth" type="number" min="0" value="1" />
